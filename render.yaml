# Render Blueprint - v2 backend only (Docker). Frontend deploys separately on Vercel.
# Dashboard: New > Blueprint > connect repo, or create Web Service manually with Docker.
services:
  - type: web
    name: ugc-machine-api
    runtime: docker
    dockerfilePath: ./v2/Dockerfile
    dockerContext: ./v2
    plan: free
    healthCheckPath: /config-status
    envVars:
      - key: KIE_API_KEY
        sync: false
      - key: KIE_BASE
        value: https://api.kie.ai
      - key: ALLOWED_ORIGIN
        sync: false
